cat > .github/workflows/build.yml << 'YAML'
name: Build & Push

on:
  push:
    branches: [main, Preview]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variant (base | sdk | python | full | all)'
        default: 'all'

env:
  REGISTRY: docker.io
  IMAGE: mosgarage/code-server

jobs:
  build:
    name: ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [base, sdk, python, full]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:${{ matrix.variant }}"
          TAGS="$TAGS,${{ env.IMAGE }}:${{ matrix.variant }}-$(date +%Y%m%d)"
          if [ "${{ matrix.variant }}" = "base" ]; then
            TAGS="$TAGS,${{ env.IMAGE }}:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          build-args: |
            NODE_VERSION=20
            DOTNET_CHANNEL=10.0

  wsl-pack:
    name: WSL pack — ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        variant: [base, sdk, python, full]

    steps:
      - uses: actions/checkout@v4

      - name: Pull built image
        run: docker pull ${{ env.IMAGE }}:${{ matrix.variant }}

      - name: Pack rootfs
        run: bash scripts/wsl-pack.sh ${{ matrix.variant }}

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: mosgarage-cs-${{ matrix.variant }}-wsl
          path: dist/mosgarage-cs-${{ matrix.variant }}.tar.gz
          retention-days: 30

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mosgarage-cs-${{ matrix.variant }}.tar.gz
YAML
