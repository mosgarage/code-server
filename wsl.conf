[boot]
# Launch supervisor (code-server + sshd + agent) on WSL instance start
command=/usr/bin/supervisord -c /etc/supervisor/conf.d/workspace.conf

[user]
# Default login user — matches mosgarage user from control plane config
default=mosgarage

[wsl2]
# Uncomment and tune for your machine
# memory=4GB
# processors=4

[interop]
enabled=true
appendWindowsPath=false
