user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/mosgarage/nginx-error.log warn;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format premium '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/mosgarage/nginx-access.log premium;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=general:10m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m      rate=120r/m;
    limit_req_zone  $binary_remote_addr zone=code:10m     rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Security headers map
    map $sent_http_content_type $csp {
        ~*text/html "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none';";
    }

    include /etc/nginx/conf.d/*.conf;
}
