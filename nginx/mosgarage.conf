# ── Upstream backends ─────────────────────────────────────────
upstream code_server  { server 127.0.0.1:8080; keepalive 4; }
upstream node_server  { server 127.0.0.1:3000; keepalive 8; }
upstream api_server   { server 127.0.0.1:4000; keepalive 8; }

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow health probes over HTTP
    location = /_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main vhost ────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # SSL
    ssl_certificate     /etc/nginx/ssl/mosgarage.crt;
    ssl_certificate_key /etc/nginx/ssl/mosgarage.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   $csp always;

    # Connection limit
    limit_conn perip 20;

    # ── Health (unauthenticated) ──────────────────────────────
    location = /_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── code-server  →  /code/ ────────────────────────────────
    location /code/ {
        limit_req zone=code burst=20 nodelay;
        proxy_pass         http://code_server/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket (code-server terminal / live reload)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering    off;
    }

    # ── API  →  /api/ ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass         http://api_server/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store" always;
    }

    # ── WebSocket hub  →  /ws ─────────────────────────────────
    location /ws {
        proxy_pass         http://node_server/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
        proxy_buffering    off;
    }

    # ── Node server  →  / (root) ──────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass         http://node_server/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── Workspace static files ────────────────────────────────
    location /workspace/ {
        alias  /app/workspace/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ =404;
    }

    # ── Deny dotfiles ─────────────────────────────────────────
    location ~ /\. { deny all; access_log off; }
}
